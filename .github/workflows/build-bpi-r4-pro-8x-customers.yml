# Customers edition (Xiaomi_ax3600) build workflow.
# Copy of build-bpi-r4-pro-8x.yml with three changes: name, single variant,
# and release tag/target (release-pro-8x-customers). Build base and packages
# come from builder-pro-8x.sh + configs/my_defconfig-8x-full on this branch.

name: Build BPI-R4 Pro 8X Customers

on:
  # Manual dispatch only. NOTE: this file must ALSO live on the default branch
  # (main) for the "Run workflow" button to appear — cherry-pick it there, then
  # run it selecting the pro-8x-customers branch (build content comes from there).
  workflow_dispatch:
    inputs:
      repo_commit:
        description: 'Commit hash of this repository (leave empty for latest)'
        required: false
        default: ''
      openwrt_commit:
        description: 'OpenWrt commit hash (leave empty to use builder default)'
        required: false
        default: ''
      mtk_commit:
        description: 'MTK SDK commit hash (leave empty to use builder default)'
        required: false
        default: ''

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.repo_commit || github.sha }}

      - name: Load optional commit overrides
        run: |
          [ -n "${{ github.event.inputs.openwrt_commit }}" ] && echo "OPENWRT_COMMIT=${{ github.event.inputs.openwrt_commit }}" >> $GITHUB_ENV || true
          [ -n "${{ github.event.inputs.mtk_commit }}" ] && echo "MTK_COMMIT=${{ github.event.inputs.mtk_commit }}" >> $GITHUB_ENV || true

      - name: Free disk space on runner
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: false

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential clang flex bison g++ gawk gcc-multilib g++-multilib \
            gettext libncurses-dev libssl-dev python3-distutils python3-setuptools \
            rsync swig unzip zlib1g-dev file wget libelf-dev ccache git

      - name: Run builder script
        run: |
          chmod +x ./builder-pro-8x.sh
          ./builder-pro-8x.sh
        env:
          OPENWRT_COMMIT: ${{ env.OPENWRT_COMMIT }}
          MTK_COMMIT: ${{ env.MTK_COMMIT }}

      - name: Prepare release artifacts
        run: |
          FILOGIC="openwrt/bin/targets/mediatek/filogic"

          mkdir -p rel-pro
          cp "${FILOGIC}/openwrt-mediatek-filogic-bananapi_bpi-r4-pro-8x-squashfs-sysupgrade.itb" rel-pro/bpi-r4-pro-8x.itb
          cp "${FILOGIC}/openwrt-mediatek-filogic-bananapi_bpi-r4-pro-8x-nvme-img.bin"            rel-pro/
          cp "${FILOGIC}/openwrt-mediatek-filogic-bananapi_bpi-r4-pro-8x-sdcard.img.gz"           rel-pro/
          cp "${FILOGIC}/openwrt-mediatek-filogic-bananapi_bpi-r4-pro-8x-emmc-img.bin"            rel-pro/
          cp "${FILOGIC}/openwrt-mediatek-filogic-bananapi_bpi-r4-pro-8x-snand-img.bin"           rel-pro/
          cp "${FILOGIC}/config.buildinfo"                                                          rel-pro/
          # customers edition = WiFi/mesh, not UniFi server -> ship install scripts
          cp my_files/bpi-r4-install/install-nvme-pro8x.sh  rel-pro/
          cp my_files/bpi-r4-install/install-emmc-pro8x.sh  rel-pro/
          cp my_files/bpi-r4-install/install-nand-pro8x.sh  rel-pro/
          cp my_files/bpi-r4-install/install-menu.sh        rel-pro/
          # ship the wifimgr package (.apk) so it can be installed on any BPI-R4 (classic too)
          cp openwrt/bin/packages/*/base/luci-app-wifimgr-*.apk rel-pro/
          cd rel-pro
          sha256sum bpi-r4-pro-8x.itb \
            openwrt-mediatek-filogic-bananapi_bpi-r4-pro-8x-nvme-img.bin \
            openwrt-mediatek-filogic-bananapi_bpi-r4-pro-8x-sdcard.img.gz \
            openwrt-mediatek-filogic-bananapi_bpi-r4-pro-8x-emmc-img.bin \
            openwrt-mediatek-filogic-bananapi_bpi-r4-pro-8x-snand-img.bin > sha256sums
          cd ..

      - name: Publish release-pro-8x-customers
        run: |
          gh release delete release-pro-8x-customers --yes --cleanup-tag 2>/dev/null || true
          gh release create release-pro-8x-customers rel-pro/* \
            --title "BPI-R4 Pro 8X - Customers Edition (Xiaomi_ax3600)" \
            --notes "WiFi 7 + wifimgr mesh (WDS-MLO Extender) + usteer roaming | RAM: 8GB | BPI-R4 Pro 8X | Hecho para Xiaomi_ax3600 - Gracias, amigo | Commit: ${{ github.event.inputs.repo_commit || github.sha }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
